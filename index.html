<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Blitztext">
<meta name="theme-color" content="#0f0f0f">
<title>Blitztext</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #1D9E75;
    --accent-dim: #0f3d2e;
    --rage: #c94a2a;
    --rage-dim: #3d1a0e;
    --text: #f0f0f0;
    --text-dim: #888;
    --text-hint: #444;
    --radius: 14px;
    --radius-sm: 9px;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  .app { flex: 1; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; width: 100%; padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 24px); }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 20px; }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .settings-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }

  /* Mode grid */
  .modes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .mode-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px; cursor: pointer;
    text-align: left; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .mode-btn:active { transform: scale(0.97); }
  .mode-btn.active { border-color: var(--accent); background: var(--accent-dim); }
  .mode-btn.active.rage-mode { border-color: var(--rage); background: var(--rage-dim); }
  .mode-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .mode-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  /* Emoji slider */
  .emoji-slider-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 16px; display: none; }
  .emoji-slider-wrap.visible { display: block; }
  .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
  .slider-header strong { color: var(--text); }
  input[type=range] { width: 100%; accent-color: var(--accent); }

  /* Record area */
  .record-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 20px 0; }
  .record-btn {
    width: 88px; height: 88px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .record-btn:active { transform: scale(0.95); }
  .record-btn.recording {
    border-color: var(--rage); background: var(--rage-dim);
    box-shadow: 0 0 0 6px rgba(201,74,42,0.15);
    animation: pulse-ring 1.5s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(201,74,42,0.3); }
    70% { box-shadow: 0 0 0 12px rgba(201,74,42,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,74,42,0); }
  }
  .record-btn svg { transition: all 0.15s; }
  .record-label { font-size: 13px; color: var(--text-dim); text-align: center; }
  .record-label.active { color: var(--rage); }

  /* Processing dots */
  .dots-wrap { display: none; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dots-wrap.visible { display: flex; }
  .dots-wrap span { font-size: 13px; color: var(--text-dim); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: dotbounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotbounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* Output */
  .output-box {
    flex: 1; min-height: 120px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; font-size: 16px; line-height: 1.65;
    color: var(--text); white-space: pre-wrap; word-break: break-word;
    margin-bottom: 12px; cursor: text;
  }
  .output-box.empty { color: var(--text-hint); font-style: italic; }

  /* Actions */
  .actions { display: flex; gap: 8px; margin-bottom: 8px; }
  .action-btn {
    flex: 1; padding: 13px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: scale(0.97); background: var(--surface2); }
  .action-btn:disabled { opacity: 0.35; cursor: default; }
  .action-btn.primary { background: var(--accent-dim); border-color: var(--accent); color: #5DCAA5; }
  .action-btn.primary:active { background: #0a2e20; }

  /* Status */
  .status { font-size: 12px; color: var(--text-dim); text-align: center; min-height: 18px; }
  .status.error { color: #e05a3a; }

  /* Settings panel */
  .settings-panel {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: flex-end; z-index: 100;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }
  .settings-panel.open { display: flex; }
  .settings-sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%; border-top: 1px solid var(--border);
  }
  .settings-sheet h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .settings-sheet label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px; }
  .settings-sheet input[type=text], .settings-sheet input[type=password] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-size: 14px; color: var(--text); font-family: inherit; margin-bottom: 14px;
  }
  .settings-sheet input:focus { outline: none; border-color: var(--accent); }
  .save-btn {
    width: 100%; padding: 13px; background: var(--accent); border: none;
    border-radius: var(--radius-sm); color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-bottom: 10px;
  }
  .close-btn {
    width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-dim); font-size: 14px; cursor: pointer;
  }
  .key-hint { font-size: 11px; color: var(--text-hint); margin-top: -10px; margin-bottom: 14px; }

  .sub-buttons { display: none; gap: 12px; justify-content: center; }
  .sub-buttons.visible { display: flex; }
  .sub-btn {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-dim); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .sub-btn:active { transform: scale(0.92); }
  .pause-btn.paused { background: var(--accent-dim); border-color: var(--accent); color: #5DCAA5; }
  .stop-btn { color: #e05a3a; border-color: #5a2010; }
  .stop-btn:active { background: var(--rage-dim); }
  .timer-bar { width: 100%; max-width: 200px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; display: none; }
  .timer-bar.visible { display: block; }
  .timer-fill { height: 100%; background: var(--accent); width: 100%; transition: width linear; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Blitz<span>text</span></div>
    <button class="settings-btn" id="settingsToggle" title="Einstellungen">⚙</button>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="normal">
      <div class="mode-name">Normal</div>
      <div class="mode-desc">Exakt wie gesprochen</div>
    </button>
    <button class="mode-btn" data-mode="plus">
      <div class="mode-name">Blitztext Plus</div>
      <div class="mode-desc">Schriftlicher formuliert</div>
    </button>
    <button class="mode-btn rage-mode" data-mode="rage">
      <div class="mode-name">Rage Mode</div>
      <div class="mode-desc">Wut → freundlich</div>
    </button>
    <button class="mode-btn" data-mode="emoji">
      <div class="mode-name">Emoji Mode</div>
      <div class="mode-desc">Mit Emojis anreichern</div>
    </button>
    <button class="mode-btn" data-mode="bullet">
      <div class="mode-name">Bullet-Modus</div>
      <div class="mode-desc">Stichpunkte &amp; Struktur</div>
    </button>
    <button class="mode-btn" data-mode="berlin">
      <div class="mode-name">Berlinerisch</div>
      <div class="mode-desc">Allet uff Berlinerisch</div>
    </button>
    <button class="mode-btn" data-mode="prompt">
      <div class="mode-name">Claude Prompt</div>
      <div class="mode-desc">Optimiert für KI</div>
    </button>
  </div>

  <div class="emoji-slider-wrap" id="emojiSlider">
    <div class="slider-header">Emoji-Dichte <strong id="emojiLabel">mittel</strong></div>
    <input type="range" id="emojiRange" min="1" max="3" step="1" value="2">
  </div>

  <div class="record-wrap">
    <button class="record-btn" id="recordBtn">
      <svg id="micIcon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#f0f0f0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="17" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div class="sub-buttons" id="subButtons">
      <button class="sub-btn pause-btn" id="pauseBtn" title="Pause">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
      </button>
      <button class="sub-btn stop-btn" id="stopBtn" title="Fertig">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
    </div>
    <div class="record-label" id="recordLabel">Tippen zum Starten</div>
  </div>

  <div class="dots-wrap" id="dotsWrap">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>Wird verarbeitet…</span>
  </div>

  <div class="output-box empty" id="output">Hier erscheint dein Text…</div>

  <div class="actions">
    <button class="action-btn primary" id="copyBtn" disabled>Kopieren</button>
    <button class="action-btn" id="clearBtn">Löschen</button>
  </div>

  <div class="status" id="status"></div>
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-sheet">
    <h3>Einstellungen</h3>
    <label>Anthropic API Key (für Plus, Rage, Emoji)</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    <p class="key-hint">Kostenlos unter console.anthropic.com — wird nur lokal gespeichert</p>
    <button class="save-btn" id="saveSettings">Speichern</button>
    <button class="close-btn" id="closeSettings">Schließen</button>
  </div>
</div>

<script>
const EMOJI_LABELS = { 1: 'wenig', 2: 'mittel', 3: 'viel' };
const EMOJI_COUNTS = { 1: '1-2', 2: '3-5', 3: '6-8' };

let currentMode = 'normal';
let emojiLevel = 2;
let isRecording = false;
let recognition = null;
let outputText = '';

const recordBtn = document.getElementById('recordBtn');
const recordLabel = document.getElementById('recordLabel');
const micIcon = document.getElementById('micIcon');
const outputEl = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const statusEl = document.getElementById('status');
const dotsWrap = document.getElementById('dotsWrap');
const emojiSlider = document.getElementById('emojiSlider');
const emojiRange = document.getElementById('emojiRange');
const emojiLabel = document.getElementById('emojiLabel');

emojiRange.oninput = () => {
  emojiLevel = +emojiRange.value;
  emojiLabel.textContent = EMOJI_LABELS[emojiLevel];
};

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    emojiSlider.classList.toggle('visible', currentMode === 'emoji');
  };
});

// Settings
document.getElementById('settingsToggle').onclick = () => {
  document.getElementById('settingsPanel').classList.add('open');
  document.getElementById('apiKeyInput').value = localStorage.getItem('bt_key') || '';
};
document.getElementById('closeSettings').onclick = () => document.getElementById('settingsPanel').classList.remove('open');
document.getElementById('settingsPanel').onclick = (e) => { if (e.target === document.getElementById('settingsPanel')) document.getElementById('settingsPanel').classList.remove('open'); };
document.getElementById('saveSettings').onclick = () => {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) localStorage.setItem('bt_key', key);
  else localStorage.removeItem('bt_key');
  document.getElementById('settingsPanel').classList.remove('open');
  setStatus('Gespeichert.');
};

function setStatus(msg, err = false) {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (err ? ' error' : '');
}

function setOutput(text) {
  outputText = text;
  outputEl.textContent = text;
  outputEl.classList.remove('empty');
  copyBtn.disabled = false;
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const subButtons = document.getElementById('subButtons');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
let finalTranscript = '';
let isPaused = false;
let silenceTimer = null;
const SILENCE_TIMEOUT = 12000;

function setRecordingUI(active) {
  isRecording = active;
  recordBtn.classList.toggle('recording', active);
  subButtons.classList.toggle('visible', active);
  micIcon.setAttribute('stroke', active ? '#e05a3a' : '#f0f0f0');
  if (!active) {
    isPaused = false;
    pauseBtn.classList.remove('paused');
    recordLabel.textContent = 'Tippen zum Starten';
    recordLabel.classList.remove('active');
  } else {
    recordLabel.classList.add('active');
  }
}

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  if (isRecording && !isPaused) {
    silenceTimer = setTimeout(() => {
      if (recognition && isRecording && !isPaused) {
        finishRecording();
      }
    }, SILENCE_TIMEOUT);
  }
}

function finishRecording() {
  clearTimeout(silenceTimer);
  if (recognition) recognition.stop();
}

recordBtn.onclick = () => {
  if (!SpeechRecognition) {
    setStatus('Spracherkennung nicht verfügbar.', true);
    return;
  }
  if (isRecording && !isPaused) {
    finishRecording();
    return;
  }
  if (isRecording && isPaused) {
    resumeRecording();
    return;
  }
  startRecording();
};

stopBtn.onclick = () => { finishRecording(); };

pauseBtn.onclick = () => {
  if (isPaused) { resumeRecording(); }
  else { pauseRecording(); }
};

function pauseRecording() {
  isPaused = true;
  clearTimeout(silenceTimer);
  if (recognition) recognition.stop();
  pauseBtn.classList.add('paused');
  recordLabel.textContent = 'Pause – tippe ▶ oder Mikrofon';
  setStatus('Pausiert – denk nach…');
}

function resumeRecording() {
  isPaused = false;
  pauseBtn.classList.remove('paused');
  const rec = new SpeechRecognition();
  rec.lang = 'de-DE';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onresult = handleResult;
  rec.onerror = handleError;
  rec.onend = () => {
    if (isPaused) return;
    if (isRecording) {
      finishAndProcess();
    }
  };

  recognition = rec;
  rec.start();
  recordLabel.textContent = 'Aufnahme läuft…';
  setStatus('Sprich weiter…');
  resetSilenceTimer();
}

function handleResult(e) {
  resetSilenceTimer();
  let interim = '';
  for (let i = e.resultIndex; i < e.results.length; i++) {
    if (e.results[i].isFinal) {
      finalTranscript += e.results[i][0].transcript + ' ';
    } else {
      interim += e.results[i][0].transcript;
    }
  }
  const display = (finalTranscript + interim).trim();
  if (display) {
    outputEl.textContent = display;
    outputEl.classList.remove('empty');
    recordLabel.textContent = 'Aufnahme läuft…';
    setStatus(interim ? '…' : '');
  }
}

function handleError(e) {
  const msgs = {
    'not-allowed': 'Mikrofon nicht erlaubt.',
    'no-speech': 'Kein Sprachsignal.',
    'network': 'Netzwerkfehler.',
    'audio-capture': 'Kein Mikrofon.',
    'aborted': ''
  };
  const msg = msgs[e.error];
  if (msg) setStatus(msg, true);
}

function finishAndProcess() {
  setRecordingUI(false);
  clearTimeout(silenceTimer);
  const text = finalTranscript.trim();
  if (!text) { setStatus('Kein Text erkannt.', true); return; }
  if (currentMode !== 'normal') {
    processWithClaude(text);
  } else {
    setOutput(text);
    setStatus('');
  }
}

function startRecording() {
  finalTranscript = '';
  isPaused = false;
  recognition = new SpeechRecognition();
  recognition.lang = 'de-DE';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    setRecordingUI(true);
    recordLabel.textContent = 'Aufnahme läuft…';
    setStatus('Sprich jetzt – Stopp ■ oder Pause ⏸ tippen');
  };

  recognition.onresult = handleResult;
  recognition.onerror = handleError;

  recognition.onend = () => {
    if (isPaused) return;
    if (isRecording) {
      finishAndProcess();
    }
  };

  recognition.start();
  resetSilenceTimer();
}

async function processWithClaude(text) {
  const key = localStorage.getItem('bt_key');
  if (!key) {
    setOutput(text);
    setStatus('Kein API Key hinterlegt – Normal-Modus verwendet. Key im ⚙ eintragen.', true);
    return;
  }

  dotsWrap.classList.add('visible');
  setStatus('');

  const prompts = {
    plus: `Du erhältst gesprochenen Text. Formuliere ihn schriftlicher und klarer, behalte Sinn und Kernaussage exakt. Gib nur den umformulierten Text aus, keine Erklärungen.\n\nText: ${text}`,
    rage: `Du erhältst wütenden oder frustrierten Text. Formuliere ihn höflich und professionell um, behalte die Kernaussage. Gib nur den umformulierten Text aus, keine Erklärungen.\n\nText: ${text}`,
    emoji: `Du erhältst einen Text. Füge ${EMOJI_COUNTS[emojiLevel]} passende Emojis ein (Dichte: ${EMOJI_LABELS[emojiLevel]}). Platziere sie natürlich im Text. Gib nur den Text mit Emojis aus, keine Erklärungen.\n\nText: ${text}`,
    bullet: `Du erhältst gesprochenen Text. Wandle ihn in eine klare Stichpunktliste um. Nutze – als Aufzählungszeichen. Gruppiere thematisch wenn sinnvoll. Gib nur die Stichpunkte aus, keine Erklärungen.\n\nText: ${text}`,
    berlin: `Du erhältst einen Text. Schreib ihn auf Berlinerisch um – mit typischem Berliner Dialekt, Ausdrücken wie "ick", "det", "wat", "ooch", "nüscht", "keen", "jut", "allet", "uff", "ma". Authentisch, herzlich, direkt. Gib nur den Berliner Text aus, keine Erklärungen.\n\nText: ${text}`,
    prompt: `Du erhältst gesprochenen, unstrukturierten Text. Formuliere daraus einen präzisen, gut strukturierten Prompt für Claude oder ein anderes KI-Modell. Der Prompt soll: klares Ziel haben, Kontext enthalten, das gewünschte Ausgabeformat definieren, und direkt verwendbar sein. Gib nur den fertigen Prompt aus, keine Erklärungen.\n\nText: ${text}`
  };

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompts[currentMode] }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    setOutput(data.content?.[0]?.text || text);
  } catch (err) {
    setOutput(text);
    const msg = err.message || 'Unbekannt'; setStatus('⚠ ' + msg, true); alert('API Fehler: ' + msg);
  } finally {
    dotsWrap.classList.remove('visible');
  }
}

copyBtn.onclick = () => {
  if (!outputText) return;
  navigator.clipboard.writeText(outputText).then(() => {
    const old = copyBtn.textContent;
    copyBtn.textContent = 'Kopiert ✓';
    setTimeout(() => { copyBtn.textContent = old; }, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = outputText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    copyBtn.textContent = 'Kopiert ✓';
    setTimeout(() => { copyBtn.textContent = 'Kopieren'; }, 1500);
  });
};

clearBtn.onclick = () => {
  outputText = '';
  outputEl.textContent = 'Hier erscheint dein Text…';
  outputEl.classList.add('empty');
  copyBtn.disabled = true;
  setStatus('');
};
</script>
</body>
</html>
